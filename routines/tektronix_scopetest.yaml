instruments:
  tektronix_mso58:
    ip: "10.59.31.94"

sequence:
  - action: setup_scope
    instrument: tektronix_mso58
    trigger:
      type: edge
      source: CH1
      level: 0.5
    channels:
      CH1: {scale: 1, position: 0}

  - action: capture
    instrument: tektronix_mso58
    channels: [1]
    duration: 20          # 100 ms
    sample_rate:
    save_to: "capture.csv"

  - action: screenshot
    instrument: tektronix_mso58
    save_to: "screen.png"